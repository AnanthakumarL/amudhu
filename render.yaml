services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────────
  - type: web
    name: amudhu-api
    runtime: python
    rootDir: Server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_NAME
        value: E-Commerce Admin Backend
      - key: DEBUG
        value: "False"
      - key: SUPABASE_URL
        value: https://teigmwfdarkhmyxanrtt.supabase.co
      - key: SUPABASE_STORAGE_BUCKET
        value: product-images
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

  # ── WhatsApp AI Bot ────────────────────────────────────────────────────────────
  - type: worker
    name: amudhu-whatsapp-bot
    runtime: node
    rootDir: whatsapp-mcp
    buildCommand: npm install
    startCommand: node src/bot.js
    plan: free
    envVars:
      - key: BACKEND_API_URL
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.5-flash,gemini-2.0-flash
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: BOT_SERVER_PORT
        value: "7998"
      - key: ADMIN_ORIGINS
        sync: false
