services:
  - type: web
    name: amudhu-api
    runtime: python
    rootDir: Server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_NAME
        value: E-Commerce Admin Backend
      - key: DEBUG
        value: "False"
      - key: SUPABASE_URL
        value: https://teigmwfdarkhmyxanrtt.supabase.co
      - key: SUPABASE_STORAGE_BUCKET
        value: product-images
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
