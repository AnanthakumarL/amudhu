services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────────
  - type: web
    name: amudhu-api
    runtime: python
    rootDir: Server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_NAME
        value: Amudhu Ice Creams Backend
      - key: DEBUG
        value: "False"
      - key: SUPABASE_URL
        value: https://teigmwfdarkhmyxanrtt.supabase.co
      - key: SUPABASE_STORAGE_BUCKET
        value: product-images
      - key: DATABASE_URL
        value: postgresql://postgres.teigmwfdarkhmyxanrtt:r0SYygxuKRVze9Bs@aws-1-ap-south-1.pooler.supabase.com:6543/postgres
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: sb_publishable_Ro66htyeQ78-VYv5w7IFAQ_uPkCo_V4
      - key: CORS_ORIGINS
        value: "https://amudhu-admin.vercel.app,https://amudhu-client-app.vercel.app,http://localhost:5173,http://localhost:5174,http://localhost:3000"
      - key: CLIENT_URL
        value: https://amudhu-client-app.vercel.app
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

  # ── WhatsApp AI Bot ────────────────────────────────────────────────────────────
